<!DOCTYPE html>
<html>
<head>
  <title>Laser Visitor Globe</title>
  <script src="//unpkg.com/globe.gl"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
    #globeViz { width: 100vw; height: 100vh; }
    .title-card { 
      position: absolute; top: 20px; left: 20px; color: white; z-index: 10; 
      background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 10px; border: 1px solid #ff4757;
    }
    h1 { margin: 0; font-size: 22px; color: #ff4757; text-shadow: 0 0 10px #ff4757; }
  </style>
</head>
<body>

  <div class="title-card">
    <h1>Location Active</h1>
    <p id="status">Scanning for Visitors...</p>
  </div>

  <div id="globeViz"></div>

  <script>
    const world = Globe()(document.getElementById('globeViz'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      
      // --- LASER BEAM SETTINGS ---
      .pointColor(() => '#ff4757')
      .pointAltitude(0.5)          // This makes the "Beam" tall
      .pointRadius(0.5)            // Thickness of the beam
      
      // --- RING PULSE SETTINGS ---
      .ringColor(() => '#ff4757')
      .ringMaxRadius(15)
      .ringPropagationSpeed(4)
      .ringRepeatPeriod(400)
      
      .controls().autoRotate = true;
      world.controls().autoRotateSpeed = 1.0;

    // Start with the Home Laser in Sri Lanka
    let locations = [{ lat: 6.9271, lng: 79.8612, name: 'HOME' }];
    
    // Show the lasers and rings immediately
    world.pointsData(locations);
    world.ringsData(locations);

    // Find Visitor and add their Laser
    fetch('https://ipapi.co/json/')
      .then(res => res.json())
      .then(data => {
        const { latitude, longitude, city } = data;
        document.getElementById('status').innerHTML = `LASER LOCKED: ${city.toUpperCase()}`;

        locations.push({ lat: latitude, lng: longitude, name: 'VISITOR' });
        
        // Update both Lasers and Rings
        world.pointsData(locations);
        world.ringsData(locations);
        
        // Fly to the new Laser Beam
        setTimeout(() => {
          world.pointOfView({ lat: latitude, lng: longitude, altitude: 1.8 }, 2000);
        }, 1000);
      });
  </script>
</body>
</html>
